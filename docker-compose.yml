name: techstore

services:
  mysql:
    image: mysql:8.4
    container_name: techstore-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-techstore}
      MYSQL_USER: ${DB_USERNAME:-techstore}
      MYSQL_PASSWORD: ${DB_PASSWORD:-techstore}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - techstore-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techstore-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-techstore}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-techstore}
      DB_PASSWORD: ${DB_PASSWORD:-techstore}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JWT_SECRET: ${JWT_SECRET:-dGVjaHN0b3JlLWRldmVsb3BtZW50LWp3dC1zZWNyZXQta2V5LTEyMzQ1Njc4OTA=}
      JWT_ISSUER: ${JWT_ISSUER:-techstore-api}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-not-configured}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-not-configured}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-not-configured}
      CLOUDINARY_AVATAR_FOLDER: ${CLOUDINARY_AVATAR_FOLDER:-techstore/avatars}
      CLOUDINARY_PRODUCT_FOLDER: ${CLOUDINARY_PRODUCT_FOLDER:-techstore/products}
      CLOUDINARY_REVIEW_FOLDER: ${CLOUDINARY_REVIEW_FOLDER:-techstore/reviews}
      CLOUDINARY_CHAT_FOLDER: ${CLOUDINARY_CHAT_FOLDER:-techstore/chat}
      MOMO_CREATE_ENDPOINT: ${MOMO_CREATE_ENDPOINT:-https://test-payment.momo.vn/v2/gateway/api/create}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-not-configured}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-not-configured}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-not-configured}
      MOMO_REDIRECT_URL: ${MOMO_REDIRECT_URL:-http://localhost:3000/payment/momo/return}
      MOMO_IPN_URL: ${MOMO_IPN_URL:-http://localhost:8080/api/payments/momo/ipn}
      MOMO_REQUEST_TYPE: ${MOMO_REQUEST_TYPE:-captureWallet}
      MOMO_LANGUAGE: ${MOMO_LANGUAGE:-vi}
      MOMO_QR_EXPIRATION: ${MOMO_QR_EXPIRATION:-10s}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider 'http://localhost:8080/api/products?size=1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - techstore-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: techstore-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - techstore-network

volumes:
  mysql_data:

networks:
  techstore-network:
    driver: bridge
